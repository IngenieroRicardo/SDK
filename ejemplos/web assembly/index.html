<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Run WASM</title>
    <style>
        body, html {
            margin: 0px;
        }
        main {
            position: absolute;
            background-color: #000;
            width: 100%;
            height: 100%;
        }
        #wasmOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        #dropZone {
            border: 2px dashed #00ff00;
            border-radius: 8px;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: background 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        #dropZone.dragover {
            background: rgba(0, 255, 0, 0.08);
            border-color: #80ff80;
        }
        #dropZone label {
            color: #00ff00;
            font-family: monospace;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }
        #dropZone .hint {
            color: #555;
            font-family: monospace;
            font-size: 13px;
        }
        #wasmFileInput {
            display: none;
        }
        #browseBtn {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: monospace;
            font-size: 13px;
            padding: 6px 18px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        #browseBtn:hover {
            background: rgba(0, 255, 0, 0.1);
        }
    </style>
</head>
<body>
<main>
    <canvas id="viewPort" width="1024" height="768"></canvas>
</main>

<div id="wasmOverlay">
    <div id="dropZone">
        <label>Arrastra tu archivo .wasm aquí</label>
        <span class="hint">— o —</span>
        <button id="browseBtn">Buscar archivo</button>
        <input type="file" id="wasmFileInput" accept=".wasm" />
    </div>
</div>

<script type="text/javascript" src="wasm_exec.js"></script>
<script type="text/javascript" src="dostoy.js"></script>
<script type="text/javascript" src="serviceworker.js"></script>


<script>

    (function() {
        var exLog = console.log; 
        console.log = function(msg) { 
            exLog.apply(this, arguments); 
            if(msg.includes("\n")){
                var lines = msg.split("\n"); 
                lines = lines.filter(val => val !== ''); 
                for (let line of lines) { 
                    dostoy.println(line); 
                } 
            } else {
                dostoy.println(msg);
            }
        } 
    })();


    function loadWasm(file) {
        document.getElementById("wasmOverlay").style.display = "none";
        const reader = new FileReader();
        reader.onload = function(e) {
            const buffer = e.target.result;
            const go = new Go();
            WebAssembly.instantiate(buffer, go.importObject).then((result) => {
                go.run(result.instance).then(() => {
                    
                    //dostoy.println()
                    dostoy.setPrompt("")
                    dostoy.setShell(false)
                    dostoy.println(" Exit");

                });
            }).catch(function(err) {
                console.log("Error al cargar el WASM: " + err);
            });
        };
        reader.readAsArrayBuffer(file);
    }

            fontHeight: 14,
            canvas: document.getElementById("viewPort"),
            shell: true,
            beforeShell: function () { 
                        dostoy.setCursor(true);
                        dostoy.setPrompt(" ");

                        // Botón buscar archivo
                        document.getElementById("browseBtn").addEventListener("click", function() {
                            document.getElementById("wasmFileInput").click();
                        });

                        // Input file clásico
                        document.getElementById("wasmFileInput").addEventListener("change", function(event) {
                            const file = event.target.files[0];
                            if (file) loadWasm(file);
                        });

                        // Drag and drop
                        const dropZone = document.getElementById("dropZone");

                        dropZone.addEventListener("dragover", function(e) {
                            e.preventDefault();
                            dropZone.classList.add("dragover");
                        });

                        dropZone.addEventListener("dragleave", function() {
                            dropZone.classList.remove("dragover");
                        });

                        dropZone.addEventListener("drop", function(e) {
                            e.preventDefault();
                            dropZone.classList.remove("dragover");
                            const file = e.dataTransfer.files[0];
                            if (file && file.name.endsWith(".wasm")) {
                                loadWasm(file);
                            } else {
                                console.log("Por favor arrastra un archivo .wasm válido.");
                            }
                        });
            },
                    prompt: "",
                    commandHandler: function (command) {
                        if (dostoy.getPrompt()==""){
                            window.read(command);
                        } else {
                            dostoy.setPrompt(" ");
                            dostoy.setShell(false);
                        }
                    }

    window.onunload = function() {
        location.reload();
    }

</script>
</body>
</html>
